scene_replacements:
  旧街区/斑马线: 小区门口路面/停车场白线
  咖啡厅/商场: 家里餐桌+杯咖啡/办公桌旁
  运动场/篮球场: 小区空地/公园步道
  对镜自拍/衣帽间: 家里穿衣镜/全身镜（整理下周围）
  居家/窗台: 窗边白墙（光线最好的地方）
  街拍/户外: 楼下小区/附近公园（走路就到）
  工业风/涂鸦墙: 白墙+后期加文字/贴纸
  海边/度假: 阳台/天台（有天空就行）

script_tiers:
  L1_小白版:
    label: 小白友好版
    persona: 像朋友/同事推荐好东西，自然不做作
    tone: 口语化、短句、生活化词汇。语速偏慢，像在聊天。
    vocabulary: 用日常词不用专业词。'踩着软'不说'回弹好'，'走着不累'不说'符合人体工学'。
    sentence_length: 15-25字/句为主，最长不超过35字。短句有节奏感。
    structure: 痛点共鸣（1句）→ 产品解法（1句）→ 使用感受（1句）
    taboo:
      - 禁止专业术语（EVA/飞织/人体工学/包裹性）
      - 禁止播音腔/朗诵腔
      - 禁止'家人们'等过度营销语气（L1就是要自然）
      - 禁止空洞形容词堆砌（好看/百搭/绝绝子/高级感）
    opening_examples:
      - 我跟你们说，这双鞋真的……（自然开头，像要分享秘密）
      - 有没有姐妹跟我一样，穿平底鞋总觉得……
      - 之前一直找不到合适的，直到试了这双——
    closing_examples:
      - 真的挺好穿的，你们自己看需不需要～
      - 链接放下面了，需要的姐妹可以去看看
      - 好啦今天的分享就这样，有问题评论区聊～
  L2_专业主播版:
    label: 专业主播版
    persona: 专业带货主播，懂产品懂人性，有控场力和说服力
    tone: 有节奏感、有轻重缓急。开场有力，痛点处放慢加重，卖点处加快提升兴奋度，收单处坚定自信。
    vocabulary: 适度使用行业词但立刻翻译成好处。'EVA发泡大底，踩下去像踩棉花一样软弹'
    sentence_length: 15-35字灵活切换。痛点用短句制造冲击，卖点用中长句充分展开，CTA用短句推动行动。
    structure: 痛点放大（2句）→ 场景共鸣（1句）→ FABE产品力（2-3句）→ 信任构建（1句）→ 行动推动（1句）
    techniques:
      - 痛点放大术：把客户心里的小烦恼变成必须解决的大问题。'脚疼不是小事，长期穿硬底鞋膝盖会代偿磨损'
      - 场景代入术：把客户拉到具体时间地点。'明早通勤路上，别人脚疼走得慢，你踩着这双像踩云朵'
      - 信任构建术：用真实体验+风险兜底替代浮夸承诺。'我自己穿了一个月，还送了运费险，不合适随时退'
      - 价值锚定术：先把价值拉高再报价。'商场同款同品质要卖到300+，我们今天工厂直发只要……'
      - 急迫感塑造术：用库存/时间/活动周期真实约束，不虚假。'这批面料只够做500双'/'活动价就到这周日'
      - 从众心理术：用销量/复购/好评数据。'已经卖了3000多双，评分4.9，评论区全是回购的'
    opening_examples:
      - 停！小个子女生今天这双不看，你会后悔——（强势停顿留人）
      - 所有脚宽星人听好：我终于找到了一双不挤脚的鞋——（身份直接喊话）
      - 这双鞋已经卖了3000多双，为什么？三个原因告诉你——（数据开场建立信任）
    closing_examples:
      - 库存不多，码数还全。现在拍下送运费险，收到不合适直接退，没有任何风险。链接在下方，赶紧冲！
      - 活动价就到今晚12点，现在拍最划算。错过了只能等下一批，到时候码数还不一定有。点击下方直接下单！
      - 想显高的、想走路不累的、想百搭不过时的，这双闭眼入。链接放这了，有问题评论区找我！
    compliance: "🚨禁用：最/第一/全网最低/100%/最后3分钟/马上涨价/保证/肯定/不买就亏。用真实库存+活动周期替代虚假紧迫。"
