# Script tiers & shooting guidance — extracted from script_knowledge.py
# Shooting tier system: L1=手机随手拍 L2=手机+简单道具 L3=专业团队

shooting_tiers:
  L1_极简:
    label: 手机随手出片
    equipment: 一部手机（iPhone/安卓均可），自然光，无需支架
    operator: 一个人自拍或同事帮拍，5分钟拍完
    scenes:
      - 窗边自然光+白墙（最佳光源，人人都能做）
      - 办公桌/茶几旁边（利用现有桌面展示产品）
      - 家门口/走廊（平整地面+自然光）
      - 小区路面/花坛边（户外自然光，步行可达）
      - 对镜自拍（全身镜或穿衣镜）
    model: 不露脸局部拍摄——只拍脚/腿/手，任何人都能拍，不需要模特
    camera_howto:
      - 手机倒置放地上→仰拍鞋底厚度（手机贴地，镜头朝上）
      - 手机靠墙→侧拍鞋面弧线（用书本垫高调整角度）
      - 手持俯拍→展示鞋头/鞋面（自然站立即可）
      - 对镜自拍→展示上脚效果（不露脸，只拍下半身）
    editing: 剪映「一键成片」或「图文成片」，选模板→导入素材→自动生成，3分钟出片
    duration: 8-15秒（越短越容易拍）
    best_for: 日常铺货/测款/批量上新，一天拍5-10款
  L2_标准:
    label: 手机+简单道具
    equipment: 手机+三脚架/自拍杆（30元以内）+ 补光灯（环形灯50元）
    operator: 自己或同事，10-15分钟拍完一款
    scenes:
      - 附近公园/绿道（步行可达的户外场景）
      - 咖啡厅/奶茶店角落（消费即可拍）
      - 小区楼下/停车场（工业风背景免费）
      - 商场走廊/电梯口（公共空间快拍）
      - 纯色背景布+补光灯（居家搭建，成本30元）
    model: 同事/朋友出镜（腰部以下或背影即可，不用露脸），或继续不露脸局部拍
    camera_howto:
      - 三脚架固定→多角度轮拍（正面/侧面/背面一次架好）
      - 自拍杆低角度→模拟跟拍（边走边拍鞋的动态效果）
      - 环形灯侧45度→突出材质纹理（光线是关键）
      - 慢动作模式→拍鞋底回弹/弯折（手机自带功能）
    editing: 剪映手动剪辑：导入→掐头去尾→卡点→加字幕→加滤镜→导出，15分钟
    duration: 15-20秒
    best_for: 主推款/爆款/有潜力的新品，一天拍2-3款
  L3_专业:
    label: 专业团队出片
    equipment: 相机/微单+专业灯光+稳定器+后期调色
    operator: 摄影师+模特+剪辑师，半天拍一款
    scenes:
      - 精心布景影棚
      - 租用外景场地
      - 创意街区/艺术园区
    model: 专业模特或达人，全身出镜+表情+动作
    camera_howto:
      - 专业运镜（滑轨/稳定器/摇臂）
      - 多机位同步拍摄
      - RAW格式后期调色
    editing: 达芬奇调色+专业剪辑软件，半天到一天
    duration: 20-30秒
    best_for: 品牌形象片/高端产品线/大促主视频

shooting_pitfalls:
  - "🚫 不要逆光拍——产品漆黑一片。正确：面对窗户，光线从背后或侧面来"
  - "🚫 不要手抖——画面晃动观众直接划走。正确：双手握手机，手肘夹紧身体"
  - "🚫 不要杂乱的背景——地上堆的快递盒、垃圾桶先移开"
  - "🚫 不要一个镜头到底——至少切3个角度（正面/侧面/细节）"
  - "🚫 不要开美颜拍产品——颜色失真，退货率高。正确：关美颜，后期调色"
  - "🚫 不要穿拖鞋/家居服拍上脚图——观众觉得不专业。正确：搭配好裤子/裙子再拍"
  - "🚫 不要在暗光下拍——噪点多画面脏。正确：找最亮的窗户或加补光灯"

