<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}FrameCraft{% endblock %}</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon-192.svg">
<meta name="theme-color" content="#050505">
<link rel="stylesheet" href="/static/css/premium.css?v=2">
<script src="/static/js/app.js?v=9" defer></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<style>
:root {
  --bg:var(--p-bg);--surface:var(--p-bg-elevated);--card:var(--p-surface);--border:var(--p-border);
  --text:var(--p-text);--muted:var(--p-text-muted);
  --accent:var(--p-accent);--accent-dim:var(--p-accent-dim);--accent-glow:var(--p-accent-glow);
  --green:#3ea86a;--red:#c05555;
  --font-display:var(--p-font-display);
  --font-body:var(--p-font-body);
  --radius:var(--p-radius);--radius-sm:var(--p-radius-sm);
  --sidebar-w:var(--p-sidebar-w);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-body);
  min-height:100vh;position:relative;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* Ambient */
.bg-ambient{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-ambient .orb{position:absolute;border-radius:50%;filter:blur(140px)}
.bg-ambient .orb-1{width:650px;height:650px;background:radial-gradient(circle,rgba(232,180,90,.15),transparent);top:-20%;left:-12%}
.bg-ambient .orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(180,140,100,.06),transparent);bottom:-15%;right:-10%}
.bg-ambient .orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(232,180,90,.05),transparent);top:55%;left:55%}

.grain-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.012;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ===== SIDEBAR NAVIGATION ===== */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:1000;
  background:rgba(10,10,15,.94);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:28px 0 20px;
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;padding:0 20px 24px;
  font-family:var(--font-display);font-weight:900;font-size:16px;color:var(--accent);
  letter-spacing:.04em;text-decoration:none;
  text-shadow:0 1px 0 #b8923e,0 2px 4px rgba(0,0,0,.5);
  border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:8px;
}
.sidebar-brand svg{filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)) drop-shadow(0 0 12px rgba(232,180,90,.25))}

.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:0 10px}
.sidebar-link{
  display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;
  color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;
  transition:all .25s;position:relative;
}
.sidebar-link:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sidebar-link.active{color:var(--text);background:rgba(232,180,90,.08)}
.sidebar-link.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
.sidebar-link .nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.6}
.sidebar-link.active .nav-icon{opacity:1}

.sidebar-footer{padding:16px 20px 0;border-top:1px solid rgba(255,255,255,.04);margin-top:8px}
.sidebar-footer .user-info{font-size:11px;color:var(--muted)}

/* ===== MAIN CONTENT AREA ===== */
.page-wrap{position:relative;z-index:2;margin-left:var(--sidebar-w);padding:48px 40px 60px;max-width:1100px}

/* ===== MOBILE TOPBAR (hidden on desktop) ===== */
.mobile-topbar{
  display:none;position:fixed;top:0;left:0;right:0;z-index:1001;
  background:rgba(10,10,15,.94);
  border-bottom:1px solid rgba(255,255,255,.04);
  padding:10px 16px;align-items:center;justify-content:space-between;
}
.mobile-topbar .brand-sm{
  font-family:var(--font-display);font-weight:900;font-size:14px;color:var(--accent);
  text-decoration:none;display:flex;align-items:center;gap:6px;
}
.mobile-menu-btn{
  background:none;border:none;color:var(--text);cursor:pointer;padding:6px;
  font-family:var(--font-body);
}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999}

/* Card */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 32px;position:relative;overflow:hidden;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.card-sm{background:rgba(255,255,255,.015);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px}

/* Buttons */
.btn{
  padding:12px 24px;background:var(--accent);color:#0a0a0a;border:none;
  border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font-body);letter-spacing:.02em;
  transition:all .4s cubic-bezier(.16,1,.3,1);
  position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:#f0c56a;box-shadow:0 0 48px rgba(232,180,90,.25);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.2) 50%,transparent 60%);
  transform:translateX(-100%) skewX(-12deg);transition:transform .8s}
.btn:hover::after{transform:translateX(200%) skewX(-12deg)}
.btn:disabled{background:rgba(255,255,255,.04);color:rgba(255,255,255,.15);cursor:not-allowed;box-shadow:none;transform:none}
.btn:disabled::after{display:none}
.btn-sm{padding:7px 16px;font-size:11px}

/* Step number */
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0}
.step-num-amber{background:rgba(232,180,90,.12);color:var(--accent)}
.step-num-purple{background:rgba(139,92,246,.1);color:#a78bfa}
.step-num-green{background:rgba(62,168,106,.1);color:var(--green)}

.section-title{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}

/* Tags */
.tag{display:inline-block;font-size:10px;padding:3px 8px;border-radius:999px;font-weight:500}
.tag-amber{background:rgba(232,180,90,.1);color:var(--accent)}
.tag-purple{background:rgba(139,92,246,.1);color:#a78bfa}
.tag-green{background:rgba(62,168,106,.1);color:var(--green)}
.tag-blue{background:rgba(59,130,246,.1);color:#60a5fa}

/* Loading spinner */
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Fade in */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp .5s ease both}

/* Shimmer */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shimmer-bg{background:linear-gradient(90deg,var(--card),rgba(255,255,255,.02),var(--card));background-size:200% 100%;animation:shimmer 2s infinite}

/* Toast */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:9999;
  padding:14px 28px;border-radius:999px;font-size:13px;font-weight:600;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  animation:fadeInUp .3s ease;font-family:var(--font-body)}
.toast.success{background:rgba(62,168,106,.12);border:1px solid rgba(62,168,106,.2);color:var(--green)}
.toast.error{background:rgba(200,90,90,.12);border:1px solid rgba(200,90,90,.2);color:var(--red)}

/* Support float */
.support-float{position:fixed;bottom:28px;right:28px;z-index:999;
  width:48px;height:48px;border-radius:50%;background:var(--accent);color:#0a0a0a;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:12px;font-weight:700;letter-spacing:.04em;
  box-shadow:0 4px 24px rgba(232,180,90,.3);
  transition:all .4s cubic-bezier(.16,1,.3,1);text-decoration:none;
  font-family:var(--font-body)}
.support-float:hover{transform:scale(1.08);box-shadow:0 8px 36px rgba(232,180,90,.45)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.1)}

/* Error */
.error-msg{padding:12px 16px;border-radius:var(--radius-sm);font-size:12px;
  background:rgba(200,90,90,.06);border:1px solid rgba(200,90,90,.12);color:var(--red)}

/* Table */
.data-table{width:100%;font-size:13px;border-collapse:collapse}
.data-table thead th{text-align:left;padding:12px 16px;font-size:10px;font-weight:500;color:var(--muted);
  letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.data-table tbody td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.02)}
.data-table tbody tr:hover{background:rgba(255,255,255,.008)}

/* Status dot */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot-green{background:var(--green)}
.status-dot-red{background:var(--red)}
.status-dot-amber{background:var(--accent);animation:pulse 2s infinite}
.status-dot-slate{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .page-wrap{margin-left:0;padding:72px 16px 40px}
  .mobile-topbar{display:flex}
  .mobile-overlay.show{display:block}
  .card{padding:20px 16px}
}
@media(min-width:769px){
  .mobile-topbar{display:none!important}
  .mobile-overlay{display:none!important}
}
</style>
{% block head_extra %}{% endblock %}
</head>
<body>

<!-- Ambient background (no particles on app pages) -->
<div class="bg-ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grain-overlay"></div>

<!-- Mobile topbar -->
<div class="mobile-topbar">
  <a href="/" class="brand-sm">
    <svg width="20" height="20" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="28" fill="transparent"/>
      <g transform="translate(96,96)">
        <rect x="-54" y="-54" width="108" height="108" rx="14" fill="none" stroke="#e8b45a" stroke-width="8" transform="rotate(45)"/>
        <circle cx="0" cy="0" r="30" fill="none" stroke="#e8b45a" stroke-width="7"/>
        <circle cx="0" cy="0" r="6" fill="#e8b45a" opacity="0.45"/>
        <line x1="-52" y1="0" x2="-34" y2="0" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
        <line x1="34" y1="0" x2="52" y2="0" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
        <line x1="0" y1="-52" x2="0" y2="-34" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
        <line x1="0" y1="34" x2="0" y2="52" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
      </g>
    </svg>
    FrameCraft
  </a>
  <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('mobileOverlay').classList.toggle('show')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</div>
<div class="mobile-overlay" id="mobileOverlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show')"></div>

<!-- Sidebar Navigation -->
<nav class="sidebar" id="sidebar">
  <a href="/" class="sidebar-brand">
    <svg width="24" height="24" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="28" fill="transparent"/>
      <g transform="translate(96,96)">
        <rect x="-54" y="-54" width="108" height="108" rx="14" fill="none" stroke="#e8b45a" stroke-width="8" transform="rotate(45)"/>
        <circle cx="0" cy="0" r="30" fill="none" stroke="#e8b45a" stroke-width="7"/>
        <circle cx="0" cy="0" r="6" fill="#e8b45a" opacity="0.45"/>
        <line x1="-52" y1="0" x2="-34" y2="0" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
        <line x1="34" y1="0" x2="52" y2="0" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
        <line x1="0" y1="-52" x2="0" y2="-34" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
        <line x1="0" y1="34" x2="0" y2="52" stroke="#e8b45a" stroke-width="5.5" stroke-linecap="round" opacity="0.8"/>
      </g>
    </svg>
    FrameCraft
  </a>
  <div class="sidebar-nav">
    <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      工作台
    </a>
    <a href="/factory" class="sidebar-link {% if request.url.path == '/factory' %}active{% endif %}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      方案生成
    </a>
    <a href="/creative" class="sidebar-link {% if request.url.path == '/creative' %}active{% endif %}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><line x1="12" y1="22" x2="12" y2="15.5"/><line x1="22" y1="8.5" x2="12" y2="15.5"/><line x1="2" y1="8.5" x2="12" y2="15.5"/>
      </svg>
      创意工作室
    </a>
    <a href="/tasks" class="sidebar-link {% if request.url.path == '/tasks' %}active{% endif %}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
      任务历史
    </a>
    <a href="/settings" class="sidebar-link {% if request.url.path == '/settings' %}active{% endif %}">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      设置
    </a>
  </div>
  <div class="sidebar-footer">
    <span class="user-info">FrameCraft v0.1.0</span>
  </div>
</nav>

<main class="page-wrap">
  {% block content %}{% endblock %}
</main>

<a href="/support" class="support-float" title="联系客服">客服</a>

<script src="/static/js/premium.js"></script>
</body>
</html>
