<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameCraft 帧导 — 创意工作室</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon-192.svg">
<meta name="theme-color" content="#4F46E5">
<link rel="stylesheet" href="/static/css/studio.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body>

<div class="s-app" x-data="studio()" x-cloak>

  <!-- Sidebar Nav -->
  <nav class="s-nav">
    <a href="/studio" class="s-nav-logo" title="FrameCraft">帧</a>
    <a href="/studio" class="s-nav-item active" title="工作室">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
    </a>
    <a href="/factory" class="s-nav-item" title="方案库">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m6 4.125l2.25 2.25m0 0l2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
      </svg>
    </a>
    <div class="s-nav-spacer"></div>
    <a href="/settings" class="s-nav-item" title="设置">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </a>
  </nav>

  <!-- Main Content -->
  <main class="s-main">

    <!-- Header -->
    <div class="s-page-header">
      <div>
        <h1 class="s-page-title">创意工作室</h1>
        <p class="s-page-subtitle">上传产品图，AI 自动生成套图与视频</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="s-btn s-btn-ghost" @click="resetAll" x-show="step > 0">重新开始</button>
      </div>
    </div>

    <div class="s-content">

      <!-- Step Indicator -->
      <div class="s-steps">
        <div class="s-step" :class="{ active: step === 1, done: step > 1 }">
          <span class="s-step-num">1</span> 上传图片
        </div>
        <div class="s-step" :class="{ active: step === 2, done: step > 2 }">
          <span class="s-step-num">2</span> AI 分析
        </div>
        <div class="s-step" :class="{ active: step === 3, done: step > 3 }">
          <span class="s-step-num">3</span> 选择输出
        </div>
        <div class="s-step" :class="{ active: step === 4, done: step > 4 }">
          <span class="s-step-num">4</span> 生成结果
        </div>
      </div>

      <!-- STEP 1: Upload -->
      <div class="s-section" x-show="step === 1">
        <div class="s-section-title">产品图片</div>

        <!-- Upload Zone -->
        <div class="s-upload-zone"
             :class="{ 'drag-over': dragOver, 'has-files': files.length > 0 }"
             @dragover.prevent="dragOver = true"
             @dragleave.prevent="dragOver = false"
             @drop.prevent="handleDrop($event)"
             @click="$refs.fileInput.click()">
          <input type="file" x-ref="fileInput" accept="image/jpeg,image/png,image/webp"
                 multiple @change="handleFiles($event)" hidden>

          <template x-if="files.length === 0">
            <div>
              <div class="s-upload-icon">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                  <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                </svg>
              </div>
              <div class="s-upload-text">拖拽图片到此处，或点击上传</div>
              <div class="s-upload-hint">支持 JPG / PNG / WebP，建议 3-10 张多角度实拍</div>
            </div>
          </template>

          <template x-if="files.length > 0">
            <div>
              <div style="font-size:14px;font-weight:600;margin-bottom:4px">
                已选择 <span x-text="files.length"></span> 张图片
              </div>
              <div style="font-size:12px;color:var(--s-text-muted);margin-bottom:4px">点击更换或继续拖拽添加</div>
            </div>
          </template>
        </div>

        <!-- File Previews -->
        <div class="s-file-grid" x-show="files.length > 0">
          <template x-for="(file, i) in files" :key="i">
            <div class="s-file-thumb">
              <img :src="previewUrl(file)" :alt="file.name">
              <button class="s-file-remove" @click.stop="removeFile(i)">&times;</button>
            </div>
          </template>
        </div>

        <!-- Industry & Info -->
        <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:end">
          <div>
            <label style="font-size:12px;color:var(--s-text-muted);display:block;margin-bottom:4px">行业品类</label>
            <select x-model="industry" style="padding:8px 12px;border:1px solid var(--s-border);border-radius:var(--s-radius-sm);font-size:13px;font-family:inherit;background:var(--s-surface)">
              <option value="鞋类">鞋类</option>
              <option value="服装">服装</option>
              <option value="美妆">美妆</option>
              <option value="食品">食品</option>
              <option value="3C数码">3C 数码</option>
              <option value="家居">家居</option>
            </select>
          </div>
          <div style="flex:1;min-width:200px">
            <label style="font-size:12px;color:var(--s-text-muted);display:block;margin-bottom:4px">补充说明（可选）</label>
            <input type="text" x-model="extraInfo" placeholder="例如：春季新品、主打舒适透气..."
                   style="width:100%;padding:8px 12px;border:1px solid var(--s-border);border-radius:var(--s-radius-sm);font-size:13px;font-family:inherit;background:var(--s-surface)">
          </div>
        </div>

        <div style="margin-top:20px">
          <button class="s-btn s-btn-primary s-btn-lg"
                  :disabled="files.length < 3"
                  @click="startAnalysis()">
            <span x-show="!analyzing">开始 AI 分析</span>
            <span x-show="analyzing" style="display:flex;align-items:center;gap:8px">
              <span class="s-spinner"></span> 分析中...
            </span>
          </button>
          <span style="margin-left:10px;font-size:12px;color:var(--s-text-muted)" x-show="files.length < 3">
            至少上传 3 张图片
          </span>
        </div>
      </div>

      <!-- STEP 2: Analysis Results -->
      <div class="s-section" x-show="step === 2">
        <div class="s-section-title">AI 分析结果</div>

        <div class="s-card" x-show="analysis">
          <div class="s-analysis-grid">
            <div class="s-analysis-item">
              <div class="s-analysis-label">品类</div>
              <div class="s-analysis-value" x-text="analysis.category || '—'"></div>
            </div>
            <div class="s-analysis-item">
              <div class="s-analysis-label">子品类</div>
              <div class="s-analysis-value" x-text="analysis.sub_category || '—'"></div>
            </div>
            <div class="s-analysis-item">
              <div class="s-analysis-label">风格</div>
              <div class="s-analysis-value" x-text="(analysis.style_keywords || []).join(' / ') || '—'"></div>
            </div>
            <div class="s-analysis-item">
              <div class="s-analysis-label">目标受众</div>
              <div class="s-analysis-value" x-text="analysis.target_audience || '—'"></div>
            </div>
            <div class="s-analysis-item">
              <div class="s-analysis-label">材质</div>
              <div class="s-analysis-value" x-text="analysis.material || '—'"></div>
            </div>
            <div class="s-analysis-item">
              <div class="s-analysis-label">配色</div>
              <div class="s-color-swatches">
                <template x-for="c in (analysis.colors || [])" :key="c.name">
                  <span class="s-color-swatch" :style="'background:' + (c.hex_guess || c.hex || '#ccc')" :title="c.name"></span>
                </template>
              </div>
            </div>
          </div>
        </div>

        <div class="s-card" style="margin-top:12px" x-show="brief">
          <div style="font-size:15px;font-weight:600;margin-bottom:8px" x-text="brief.concept_name || '创意方案'"></div>
          <div style="font-size:13px;color:var(--s-text-secondary);margin-bottom:12px" x-text="brief.concept_description || ''"></div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            <template x-for="tag in (brief.mood_keywords || [])" :key="tag">
              <span class="s-badge s-badge-info" x-text="tag"></span>
            </template>
          </div>
          <div style="margin-top:12px;font-size:12px;color:var(--s-text-muted)">
            场景方案：<span x-text="(brief.scenes || []).map(s => s.scene_name || s).join('、')"></span>
          </div>
        </div>

        <div style="margin-top:20px;display:flex;gap:10px">
          <button class="s-btn s-btn-primary s-btn-lg" @click="step = 3">继续 → 选择输出</button>
          <button class="s-btn s-btn-secondary s-btn-lg" @click="step = 1">返回修改</button>
        </div>
      </div>

      <!-- STEP 3: Output Mode -->
      <div class="s-section" x-show="step === 3">
        <div class="s-section-title">选择输出模式</div>

        <div class="s-mode-grid">
          <!-- Image Workshop -->
          <div class="s-mode-card" :class="{ selected: outputMode === 'images' }" @click="outputMode = 'images'">
            <div class="s-mode-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
            </div>
            <div class="s-mode-name">图片工坊</div>
            <div class="s-mode-desc">产品抠图 + 场景合成 + 多平台套图<br>输出 60-80 张商品图</div>
          </div>

          <!-- Video Workshop -->
          <div class="s-mode-card" :class="{ selected: outputMode === 'video' }" @click="outputMode = 'video'">
            <div class="s-mode-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9A2.25 2.25 0 004.5 18.75z"/>
              </svg>
            </div>
            <div class="s-mode-name">视频工坊</div>
            <div class="s-mode-desc">脚本生成 + TTS 配音 + GSAP 动画<br>输出带货短视频 MP4</div>
          </div>
        </div>

        <!-- Platform Tags -->
        <div style="margin-top:20px">
          <div style="font-size:12px;color:var(--s-text-muted);margin-bottom:8px">目标平台</div>
          <div class="s-platform-tags">
            <template x-for="p in ['douyin','xiaohongshu','kuaishou','shipinhao','taobao','jingdong','pdd']" :key="p">
              <span class="s-platform-tag"
                    :class="{ active: platforms.includes(p) }"
                    @click="togglePlatform(p)"
                    x-text="platformLabel(p)"></span>
            </template>
          </div>
        </div>

        <div style="margin-top:20px;display:flex;gap:10px">
          <button class="s-btn s-btn-primary s-btn-xl"
                  :disabled="!outputMode || generating"
                  @click="startGeneration()">
            <span x-show="!generating">开始生成</span>
            <span x-show="generating" style="display:flex;align-items:center;gap:8px">
              <span class="s-spinner"></span> <span x-text="progressMsg"></span>
            </span>
          </button>
          <button class="s-btn s-btn-secondary s-btn-lg" @click="step = 2" :disabled="generating">返回</button>
        </div>

        <!-- Progress Bar -->
        <div style="margin-top:16px" x-show="generating">
          <div class="s-progress">
            <div class="s-progress-bar" :style="'width:' + progress + '%'"></div>
          </div>
          <div style="font-size:11px;color:var(--s-text-muted);margin-top:4px;text-align:right" x-text="progress + '%'"></div>
        </div>
      </div>

      <!-- STEP 4: Results -->
      <div class="s-section" x-show="step === 4">
        <div class="s-section-title">生成结果</div>

        <!-- Image Results -->
        <template x-if="outputMode === 'images' && imageResults.length > 0">
          <div>
            <div style="font-size:13px;color:var(--s-text-secondary);margin-bottom:12px">
              共生成 <strong x-text="imageResults.length"></strong> 张套图
            </div>
            <div class="s-result-grid">
              <template x-for="img in imageResults" :key="img.path">
                <div class="s-result-card">
                  <img :src="'/data/c1_output/' + img.path.split('/').slice(-2).join('/')" alt="composite" loading="lazy"
                       @error="$el.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22267%22%3E%3Crect fill=%22%23f1f5f9%22 width=%22200%22 height=%22267%22/%3E%3Ctext fill=%22%2394a3b8%22 x=%22100%22 y=%22133%22 text-anchor=%22middle%22 font-size=%2212%22%3E加载中...%3C/text%3E%3C/svg%3E'">
                  <div class="s-result-info">
                    <span x-text="img.platform"></span>
                    <span style="color:var(--s-text-muted);margin-left:8px" x-text="img.scene?.split('.')[0] || ''"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Video Result -->
        <template x-if="outputMode === 'video' && videoResult">
          <div class="s-card">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
              <span class="s-badge s-badge-success">导出完成</span>
              <span style="font-size:14px;font-weight:600" x-text="videoResult.title"></span>
              <span style="font-size:12px;color:var(--s-text-muted)" x-text="videoResult.beats + ' 个镜头 · ' + videoResult.duration_s + 's'"></span>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <a :href="videoResult.preview_url" target="_blank" class="s-btn s-btn-primary s-btn-lg">预览 HTML</a>
              <a x-show="videoResult.mp4_path" :href="'/data/videos/' + videoResult.output_dir.split('/').pop() + '/output.mp4'"
                 class="s-btn s-btn-secondary s-btn-lg" download>下载 MP4</a>
              <a x-show="videoResult.srt_path" :href="'/data/videos/' + videoResult.output_dir.split('/').pop() + '/subtitles.srt'"
                 class="s-btn s-btn-ghost s-btn-lg" download>下载字幕</a>
            </div>
          </div>
        </template>

        <!-- Empty state -->
        <template x-if="(outputMode === 'images' && imageResults.length === 0 && !generating) || (outputMode === 'video' && !videoResult && !generating)">
          <div class="s-empty">
            <div class="s-empty-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                <path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/>
              </svg>
            </div>
            <div class="s-empty-title">暂无结果</div>
            <div class="s-empty-desc">请检查网络连接后重试</div>
          </div>
        </template>

        <div style="margin-top:24px;display:flex;gap:10px">
          <button class="s-btn s-btn-primary s-btn-lg" @click="resetAll">开始新的创作</button>
          <button class="s-btn s-btn-secondary s-btn-lg" @click="step = 3" x-show="!generating">调整输出设置</button>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Toast Container -->
<div class="s-toast-container" x-data x-show="false" style="display:none"></div>

<script>
function studio() {
  return {
    // State
    step: 1,
    files: [],
    dragOver: false,
    industry: '鞋类',
    extraInfo: '',
    scriptType: 'with_cart',

    // Analysis
    analyzing: false,
    analysis: {},
    brief: {},

    // Output
    outputMode: '',
    platforms: ['douyin', 'xiaohongshu'],

    // Generation
    generating: false,
    progress: 0,
    progressMsg: '',
    imageResults: [],
    videoResult: null,

    // Computed
    get fileCount() { return this.files.length; },

    // Methods
    previewUrl(file) {
      return file._url || (file._url = URL.createObjectURL(file));
    },

    handleDrop(e) {
      this.dragOver = false;
      this.addFiles(e.dataTransfer.files);
    },

    handleFiles(e) {
      this.addFiles(e.target.files);
      e.target.value = '';
    },

    addFiles(fileList) {
      const valid = ['image/jpeg', 'image/png', 'image/webp', 'image/jpg'];
      for (let f of fileList) {
        if (valid.includes(f.type) || f.name.match(/\.(jpg|jpeg|png|webp)$/i)) {
          if (this.files.length >= 10) break;
          if (!this.files.find(ex => ex.name === f.name && ex.size === f.size)) {
            this.files.push(f);
          }
        }
      }
    },

    removeFile(i) { this.files.splice(i, 1); },

    platformLabel(p) {
      const map = { douyin: '抖音', xiaohongshu: '小红书', kuaishou: '快手', shipinhao: '视频号', taobao: '淘宝', jingdong: '京东', pdd: '拼多多' };
      return map[p] || p;
    },

    togglePlatform(p) {
      const idx = this.platforms.indexOf(p);
      if (idx >= 0) this.platforms.splice(idx, 1);
      else this.platforms.push(p);
    },

    resetAll() {
      this.step = 1;
      this.files = [];
      this.analysis = null;
      this.brief = null;
      this.outputMode = '';
      this.generating = false;
      this.progress = 0;
      this.imageResults = [];
      this.videoResult = null;
    },

    async startAnalysis() {
      if (this.files.length < 3) return;
      this.analyzing = true;

      try {
        const form = new FormData();
        this.files.forEach(f => form.append('files', f));
        form.append('industry', this.industry);
        form.append('extra_info', this.extraInfo);
        form.append('script_type', this.scriptType);
        form.append('variant_count', '1');

        const resp = await fetch('/api/creative/analyze', { method: 'POST', body: form });
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || '分析失败');
        }

        const data = await resp.json();
        this.analysis = data.product_analysis || {};
        this.brief = data.creative_brief || {};
        this.step = 2;
        this.showToast('AI 分析完成', 'success');
      } catch (e) {
        this.showToast(e.message || '分析失败，请重试', 'error');
      } finally {
        this.analyzing = false;
      }
    },

    async startGeneration() {
      if (!this.outputMode || this.files.length === 0) return;
      this.step = 4;
      this.generating = true;
      this.progress = 5;
      this.progressMsg = '正在准备...';

      try {
        if (this.outputMode === 'images') {
          await this.runImageGeneration();
        } else {
          await this.runVideoGeneration();
        }
      } catch (e) {
        this.showToast(e.message || '生成失败', 'error');
      } finally {
        this.generating = false;
        this.progress = 100;
      }
    },

    async runImageGeneration() {
      this.progressMsg = '正在生成场景图...';
      this.progress = 20;

      const form = new FormData();
      this.files.forEach(f => form.append('files', f));
      form.append('industry', this.industry);
      form.append('extra_info', this.extraInfo);
      form.append('platforms', this.platforms.join(','));
      form.append('generate_scenes', 'true');

      const resp = await fetch('/api/creative/batch-generate', { method: 'POST', body: form });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || '生成失败');
      }

      const { job_id, ws_url } = await resp.json();

      // Poll for progress
      await this.pollJob(job_id, '/api/creative/jobs/');

      // Fetch job results
      const jobResp = await fetch('/api/creative/jobs/' + job_id);
      const jobData = await jobResp.json();

      this.progressMsg = '生成完成';
      this.imageResults = jobData.output_files || [];
    },

    async runVideoGeneration() {
      this.progressMsg = '正在分析产品...';
      this.progress = 15;

      // Step 1: Analyze
      const form1 = new FormData();
      this.files.forEach(f => form1.append('files', f));
      form1.append('industry', this.industry);
      form1.append('extra_info', this.extraInfo);
      form1.append('script_type', this.scriptType);
      form1.append('variant_count', '1');
      form1.append('generate_scenes', 'true');

      const analyzeResp = await fetch('/api/creative/analyze', { method: 'POST', body: form1 });
      if (!analyzeResp.ok) throw new Error('分析失败');
      const analyzeData = await analyzeResp.json();

      if (!analyzeData.brief_id) throw new Error('未生成创意方案 ID');

      this.progressMsg = '正在导出视频...';
      this.progress = 40;

      // Step 2: Export video
      const form2 = new FormData();
      form2.append('brief_id', analyzeData.brief_id);
      form2.append('plan_index', '0');
      form2.append('industry', this.industry);
      form2.append('script_type', this.scriptType);

      const platform = this.platforms[0] || 'douyin';
      form2.append('platform', platform);

      const exportResp = await fetch('/api/creative/export-video', { method: 'POST', body: form2 });
      if (!exportResp.ok) {
        const err = await exportResp.json();
        throw new Error(err.detail || '视频导出失败');
      }

      this.videoResult = await exportResp.json();
      this.progressMsg = '视频导出完成';
    },

    async pollJob(jobId, baseUrl) {
      let attempts = 0;
      const maxAttempts = 120;

      while (attempts < maxAttempts) {
        await new Promise(r => setTimeout(r, 2000));
        attempts++;

        try {
          const resp = await fetch(baseUrl + jobId);
          const data = await resp.json();

          if (data.progress) {
            this.progress = Math.min(data.progress, 95);
            this.progressMsg = data.message || '处理中...';
          }

          if (data.status === 'completed') {
            this.progress = 100;
            return;
          }
          if (data.status === 'failed') {
            throw new Error(data.message || '任务失败');
          }
        } catch (e) {
          if (e.message.includes('任务失败')) throw e;
        }
      }
      throw new Error('任务超时');
    },

    showToast(msg, type) {
      const container = document.querySelector('.s-toast-container');
      const toast = document.createElement('div');
      toast.className = 's-toast s-toast-' + (type || '');
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    },
  };
}
</script>

  [x-cloak] { display: none !important; }
