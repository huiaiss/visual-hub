<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="28" fill="#050505"/>
  <g transform="translate(96,96)">
    <!-- Outer frame — rotated square with rounded corners ("帧") -->
    <rect x="-54" y="-54" width="108" height="108" rx="14" fill="none" stroke="#e8b45a" stroke-width="2.8" transform="rotate(45)"/>
    <!-- Inner ring — lens/aperture -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#e8b45a" stroke-width="2.5"/>
    <!-- Center dot — focus point -->
    <circle cx="0" cy="0" r="6" fill="#e8b45a" opacity="0.45"/>
    <!-- Crosshair guide lines — director's viewfinder -->
    <line x1="-52" y1="0" x2="-34" y2="0" stroke="#e8b45a" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="34" y1="0" x2="52" y2="0" stroke="#e8b45a" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-52" x2="0" y2="-34" stroke="#e8b45a" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="34" x2="0" y2="52" stroke="#e8b45a" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- Corner accent dots — frame corners -->
    <circle cx="-54" cy="-54" r="3.5" fill="#e8b45a" transform="rotate(45)"/>
    <circle cx="54" cy="-54" r="3.5" fill="#e8b45a" transform="rotate(45)"/>
    <circle cx="-54" cy="54" r="3.5" fill="#e8b45a" transform="rotate(45)"/>
    <circle cx="54" cy="54" r="3.5" fill="#e8b45a" transform="rotate(45)"/>
  </g>
</svg>
